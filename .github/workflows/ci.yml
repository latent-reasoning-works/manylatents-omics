name: CI - Integration with manylatents

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - name: Checkout manylatents-omics
      uses: actions/checkout@v4
      with:
        path: manylatents-omics
    
    - name: Checkout manylatents (main)
      uses: actions/checkout@v4
      with:
        repository: latent-reasoning-works/manylatents
        ref: main
        path: manylatents
        token: ${{ secrets.LRW_CI_TOKEN }}
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    
    - name: Override git sources in pyproject.toml
      working-directory: manylatents-omics
      run: |
        # Replace git source with local path for CI
        sed -i 's|git = "https://github.com/latent-reasoning-works/manylatents.git"|path = "../manylatents", editable = true|' pyproject.toml
        echo "Updated pyproject.toml:"
        grep -A 2 "\[tool.uv.sources\]" pyproject.toml
    
    - name: Install manylatents (core)
      working-directory: manylatents
      run: |
        uv sync
    
    - name: Install manylatents-omics with local manylatents
      working-directory: manylatents-omics
      run: |
        # Now install with local path reference
        uv sync
    
    - name: Run omics package tests
      working-directory: manylatents-omics
      run: |
        uv run pytest tests/ -v
    
    - name: Test namespace package imports
      working-directory: manylatents-omics
      run: |
        uv run python -c "
        print('Testing manylatents-omics namespace package integration...')
        print()
        
        # Test omics imports
        from manylatents.omics.data import PlinkDataset, HGDPDataset, HGDPDataModule
        print('✅ Imported PlinkDataset, HGDPDataset, HGDPDataModule')
        
        from manylatents.omics.metrics import GeographicPreservation, AdmixturePreservation
        print('✅ Imported GeographicPreservation, AdmixturePreservation')
        
        # Test that we can import core manylatents too
        from manylatents.data.synthetic_dataset import SwissRoll
        print('✅ Can also import core manylatents (SwissRoll)')
        
        # Verify namespace package structure
        import manylatents.omics
        assert hasattr(manylatents.omics, 'data')
        assert hasattr(manylatents.omics, 'metrics')
        print('✅ Namespace package structure verified')
        
        print()
        print('='*60)
        print('✅✅✅ All integration tests passed!')
        print('='*60)
        "
    
    - name: Run manylatents core tests (smoke test)
      working-directory: manylatents
      run: |
        uv run pytest manylatents/data/test_data.py -v
        echo "✅ Core manylatents tests still work with omics installed"
