name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install ".[popgen,singlecell]" pytest

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v -k "not gpu"

      - name: Smoke test — namespace packages
        run: |
          source .venv/bin/activate
          python -c "
          from manylatents.popgen.data import ManifoldGeneticsDataset, ManifoldGeneticsDataModule
          from manylatents.popgen.metrics import GeographicPreservation, AdmixturePreservation
          from manylatents.dogma.encoders.base import FoundationEncoder
          from manylatents.data.synthetic_dataset import SwissRoll
          import manylatents.popgen
          import manylatents.dogma
          print('namespace packages OK')
          "

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install ".[docs]"

      - name: Build docs (strict)
        run: |
          source .venv/bin/activate
          mkdocs build --strict

  docs-deploy:
    name: Deploy Docs
    needs: [test, docs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install ".[docs]"

      - name: Deploy to GitHub Pages
        run: |
          source .venv/bin/activate
          mkdocs gh-deploy --force
