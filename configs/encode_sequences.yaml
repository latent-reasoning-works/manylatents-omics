# Central Dogma Encoder Experiment Config
#
# Usage:
#   python -m manylatents.dogma.experiments.encode_sequences encoder=esm3
#   python -m manylatents.dogma.experiments.encode_sequences -m encoder=esm3,orthrus,evo2

defaults:
  - _self_
  - encoder: esm3

# Sequences to encode
sequences: synthetic_short  # or gfp_fragment

# WandB settings
project: central-dogma-encoders
name: encoder_test

# Runtime
seed: 42
debug: false

# Hydra output directory
hydra:
  run:
    dir: outputs/${name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: outputs/${name}/sweeps/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
