# Central Dogma Encoder Test Experiment
#
# Tests foundation model encoders (ESM3, Orthrus, Evo2) on synthetic sequences.
#
# Usage:
#   python -m manylatents.main +experiment=central_dogma_test +encoder=esm3
#   python -m manylatents.main +experiment=central_dogma_test +encoder=orthrus
#   python -m manylatents.main +experiment=central_dogma_test +encoder=evo2
#
# Sweep all encoders:
#   python -m manylatents.main -m +experiment=central_dogma_test '+encoder=esm3,orthrus,evo2'
#
# With cluster:
#   python -m manylatents.main -m cluster=mila_remote resources=gpu \
#     +experiment=central_dogma_test '+encoder=esm3,orthrus,evo2'

# @package _global_

defaults:
  - override /data: sequence_synthetic
  - override /algorithms/latent: encoder_adapter
  - override /logger: wandb

# Project settings
name: central_dogma_test
project: central-dogma-encoders

# Runtime
seed: 42
debug: false

# Eval only - no training needed for foundation encoders
eval_only: false
