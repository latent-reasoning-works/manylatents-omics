# @package _global_
#
# ClinVar Shared Subspace Analysis
#
# Fuses multi-modal embeddings using PCA-based fusion and analyzes
# shared vs modality-specific components via loadings decomposition.
#
# Prerequisites:
#   Run encode_dna, encode_rna, and encode_protein experiments first.
#
# Usage:
#   # Default: DNA + Protein with concat_pca fusion
#   python -m manylatents.main --config-name=config experiment=clinvar/shared_subspace
#
#   # All three modalities
#   python -m manylatents.main --config-name=config experiment=clinvar/shared_subspace \
#     data.channels=[esm3,evo2,orthrus] \
#     'callbacks.embedding.loadings_analysis.modality_dims=[1536,1920,256]' \
#     'callbacks.embedding.loadings_analysis.modality_names=[protein,dna,rna]'
#
#   # With classifier for AUC
#   python -m manylatents.main --config-name=config experiment=clinvar/shared_subspace \
#     algorithms.latent._target_=manylatents.algorithms.latent.classifier.ClassifierModule

# Project settings
name: clinvar_shared_subspace
project: merging-dogma

# Runtime
seed: 42
debug: false

# Data configuration - precomputed embeddings
data:
  _target_: manylatents.data.PrecomputedDataModule
  path: ${paths.output_dir}/embeddings/clinvar
  channels:
    - esm3       # Protein: 1536 dim
    - evo2       # DNA: 1920 dim
  labels_path: ${paths.output_dir}/embeddings/clinvar/labels.pt
  batch_size: 128
  num_workers: 0
  mode: full

# Algorithm configuration - MergingModule with PCA fusion
# This enables get_loadings() for interpretability
algorithms:
  latent:
    _target_: manylatents.algorithms.latent.MergingModule
    strategy: concat_pca  # Enables loadings extraction
    channels: null
    weights: null
    normalize: false
    n_components: 50  # PCA components for loadings analysis

# Callbacks for interpretability
callbacks:
  embedding:
    loadings_analysis:
      _target_: manylatents.callbacks.embedding.loadings_analysis.LoadingsAnalysisCallback
      modality_dims: [1536, 1920]  # Protein, DNA (order matches channels)
      modality_names: [protein, dna]
      threshold: 0.1
      log_to_wandb: true

# Metrics
metrics:
  embedding:
    participation_ratio:
      _target_: manylatents.metrics.ParticipationRatio
      _partial_: true
    local_intrinsic_dim:
      _target_: manylatents.metrics.LocalIntrinsicDimensionality
      _partial_: true
