# @package _global_
#
# Fusion: Concatenation + PCA
#
# Concatenate embeddings, then apply PCA to reduce to target dimension.
# Provides interpretable loadings showing per-channel contribution.
#
# Usage:
#   python -m manylatents.main --config-name=config experiment=fusion/concat_pca
#
#   # Different target dimensions
#   python -m manylatents.main --config-name=config experiment=fusion/concat_pca \
#     algorithms.latent.target_dim=128

defaults:
  - base

name: fusion_concat_pca

algorithms:
  latent:
    _target_: manylatents.algorithms.latent.MergingModule
    strategy: concat_pca
    channels: null
    normalize: false
    target_dim: 256
