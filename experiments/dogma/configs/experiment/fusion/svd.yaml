# @package _global_
#
# Fusion: Truncated SVD
#
# Concatenate embeddings, then apply truncated SVD to reduce dimensions.
# Similar to concat_pca but doesn't center data (useful for sparse embeddings).
#
# Usage:
#   python -m manylatents.main --config-name=config experiment=fusion/svd

defaults:
  - base

name: fusion_svd

algorithms:
  latent:
    _target_: manylatents.algorithms.latent.MergingModule
    strategy: svd
    channels: null
    normalize: false
    target_dim: 256
