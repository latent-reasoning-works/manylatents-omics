# @package _global_

# A100 GPU resources for AlphaGenome and BF16 models (Evo2)
# Requires Ampere+ architecture for BF16 support

hydra:
  launcher:
    cpus_per_task: 4
    gpus_per_task: null
    mem_gb: 32
    timeout_min: 1440  # 24 hours for full variant type
    array_parallelism: 3
    gres: "gpu:a100:1"

    # Setup commands run before job starts
    setup:
      - "module load cuda/12.1.1"
