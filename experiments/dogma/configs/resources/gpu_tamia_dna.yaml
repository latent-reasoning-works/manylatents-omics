# @package _global_

# Tamia GPU resources for DNA encoders (Evo2 + ESM3)
# Uses .venv-dna with torch 2.8+cu126
#
# Tamia has H200 (8×141GB) — ideal for Evo2 with large context.
# H100 (4×80GB) also works. Request h100 as default for availability.

hydra:
  mode: MULTIRUN
  launcher:
    cpus_per_task: 4
    gpus_per_task: 0
    array_parallelism: 4

    additional_parameters:
      time: "12:00:00"
      nodes: 1
      mem: 32G
      ntasks_per_node: 1
      gpus_per_node: "h100:4"
      account: aip-wolfg

    setup:
      - "module load cuda/12.6 python/3.12"
      - "export LIBRARY_PATH=$CUDA_PATH/lib/stubs:$LIBRARY_PATH"
      - "export LD_LIBRARY_PATH=$CUDA_PATH/lib64:$LD_LIBRARY_PATH"
      - "cd $SLURM_SUBMIT_DIR"
      - "export VIRTUAL_ENV=$SLURM_SUBMIT_DIR/.venv-dna"
      - "export PATH=$VIRTUAL_ENV/bin:$PATH"
      - "export HF_HOME=/scratch/c/cesarmvc/merging-dogma/models/huggingface"
      - "export HF_HUB_OFFLINE=1"
