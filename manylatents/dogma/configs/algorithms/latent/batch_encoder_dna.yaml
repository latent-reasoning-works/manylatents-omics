# Batch DNA encoder using Evo2
#
# Encodes batches of DNA sequences using Evo2 foundation model.
# For use with ClinVarDataModule which provides lists of sequences.
#
# Output: Embeddings of shape (N, 1920) where N = number of sequences

_target_: manylatents.dogma.algorithms.BatchEncoder
modality: dna
batch_size: 8
normalize: false
n_components: 1920

encoder_config:
  _target_: manylatents.dogma.encoders.Evo2Encoder
  model_name: evo2_1b_base
  layer_name: blocks.14.mlp.l3
  device: cuda
