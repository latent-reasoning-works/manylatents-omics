# Central Dogma Fusion Algorithm
#
# Concatenates embeddings from all 3 central dogma foundation models:
#   - DNA: Evo2 (1920-dim, 1B model)
#   - RNA: Orthrus (256-dim)
#   - Protein: ESM3 (1536-dim)
#
# Output: Concatenated embedding of shape (batch, 3712)
#
# GPU Requirements:
#   - ~24GB+ VRAM to load all 3 encoders simultaneously
#   - Recommend A100/L40S/H100 GPUs
#
# Usage:
#   python -m manylatents.main +experiment=central_dogma_fusion
#   python -m manylatents.main +experiment=central_dogma_fusion algorithms.latent.normalize=true

_target_: manylatents.dogma.algorithms.CentralDogmaFusion

# Evo2 DNA encoder configuration
evo2_config:
  _target_: manylatents.dogma.encoders.Evo2Encoder
  model_name: evo2_1b_base
  layer_name: null  # Uses default middle layer
  device: cuda

# Orthrus RNA encoder configuration (loads precomputed embeddings)
# Due to mamba-ssm version conflict, Orthrus embeddings must be precomputed.
# See tools/orthrus-embed/README.md for instructions.
orthrus_config:
  _target_: manylatents.dogma.encoders.OrthrusEncoder
  cache_dir: /network/scratch/c/cesar.valdez/embeddings/orthrus
  embedding_dim: 256  # 4-track model
  device: cuda

# ESM3 Protein encoder configuration
esm3_config:
  _target_: manylatents.dogma.encoders.ESM3Encoder
  weights_path: null  # Uses HuggingFace by default
  device: cuda

# Fusion options
normalize: false  # L2-normalize each modality before concatenation
n_components: 3712  # 1920 (DNA) + 256 (RNA) + 1536 (Protein)
