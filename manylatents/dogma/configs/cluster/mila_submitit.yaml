# @package _global_

# Mila cluster configuration using submitit_slurm launcher
# Use this when running from a Mila login node

defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  mode: MULTIRUN
  run:
    dir: logs/${name}/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/${name}/multiruns/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

  launcher:
    # Resource parameters (override with resources config group)
    timeout_min: 240
    cpus_per_task: 4
    gpus_per_task: 0  # Default 0, resource configs override to 1
    tasks_per_node: 1
    mem_gb: 16
    nodes: 1
    partition: main

    # Setup commands
    setup:
      - echo "Starting job on $(hostname)"
      - echo "SLURM_JOB_ID $SLURM_JOB_ID"
