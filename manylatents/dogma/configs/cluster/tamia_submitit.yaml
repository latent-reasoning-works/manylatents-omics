# @package _global_

# Tamia (Alliance Canada) cluster configuration using submitit_slurm launcher
# H200 (8×141GB) and H100 (4×80GB) GPU nodes
# No internet access — all data/weights must be pre-transferred

defaults:
  - override /hydra/launcher: submitit_slurm

hydra:
  mode: MULTIRUN
  run:
    dir: logs/${name}/runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: logs/${name}/multiruns/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

  launcher:
    # Resource parameters (override with resources config group)
    timeout_min: 240
    cpus_per_task: 4
    gpus_per_task: 0
    tasks_per_node: 1
    mem_gb: 16
    nodes: 1
    partition: gpubase_bynode_b2

    # Tamia requires --account
    additional_parameters:
      account: aip-wolfg

    # Setup commands
    setup:
      - echo "Starting job on $(hostname)"
      - echo "SLURM_JOB_ID $SLURM_JOB_ID"
