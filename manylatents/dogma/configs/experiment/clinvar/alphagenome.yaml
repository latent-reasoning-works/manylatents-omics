# @package _global_
#
# AlphaGenome Regulatory Effect Prediction Experiment
#
# Predicts regulatory effects of ClinVar variants using AlphaGenome.
# Outputs per-track effect scores (splice, rna_seq, cage, atac, dnase).
#
# Cell Types (ontology terms):
#   - K562:    EFO:0002067 (chronic myelogenous leukemia)
#   - HepG2:   EFO:0001187 (hepatocellular carcinoma)
#   - GM12878: EFO:0002784 (lymphoblastoid)
#   - generic: UBERON:0000468 (multicellular organism)
#
# Usage:
#   # Single job (local, requires A100)
#   python -m manylatents.omics.main experiment=clinvar/alphagenome \
#       data.variant_type=synonymous \
#       algorithms.latent.cell_type=K562
#
#   # Test with limited variants
#   python -m manylatents.omics.main experiment=clinvar/alphagenome \
#       data.variant_type=synonymous data.max_variants=10
#
#   # Multirun: 4 variant types × 3 cell types = 12 jobs
#   python -m manylatents.omics.main -m experiment=clinvar/alphagenome \
#       cluster=mila_submitit resources=gpu_a100 \
#       'data.variant_type=splice_extended,utr_combined,synonymous,missense' \
#       'algorithms.latent.cell_type=K562,HepG2,GM12878'
#
#   # Config inspection (dry run)
#   python -m manylatents.omics.main --cfg job experiment=clinvar/alphagenome
#
# GPU Requirements:
#   Requires Ampere+ GPU (A100, L40S, H100) for BF16 support.
#   Use resources=gpu_a100 for cluster submission.

# Project settings
name: clinvar_alphagenome
project: merging-dogma

# Runtime
seed: 42
debug: false

# Data configuration
data:
  _target_: manylatents.dogma.data.variant_datamodule.VariantDataModule
  variants_dir: ${data_dir}/clinvar/variants
  sequences_dir: ${data_dir}/clinvar/sequences
  variant_type: synonymous
  modality: dna
  batch_size: 1  # AlphaGenome processes one at a time
  max_variants: null

# Algorithm configuration
algorithms:
  latent:
    _target_: manylatents.dogma.algorithms.alphagenome_predictor.AlphaGenomePredictor
    cell_type: K562
    ontology: null  # Auto-resolved from cell_type
    target_length: 16384
    save_path: ${output_dir}/alphagenome/${algorithms.latent.cell_type}
    n_components: 6  # 5 tracks + aggregate
