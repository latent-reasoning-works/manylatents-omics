# @package _global_
#
# ClinVar Deviation Analysis
#
# Tests hypothesis: variants that deviate from shared cross-modal subspace
# (high outlier scores) are enriched for pathogenicity.
#
# Computes Local Outlier Factor (LOF) scores on fused embeddings and
# evaluates correlation with pathogenicity labels via AUC.
#
# Prerequisites:
#   Run encode_dna, encode_rna, and encode_protein experiments first.
#
# Usage:
#   # Default: DNA + Protein fusion
#   python -m manylatents.main --config-name=config experiment=clinvar/deviation
#
#   # All three modalities
#   python -m manylatents.main --config-name=config experiment=clinvar/deviation \
#     data.channels=[esm3,evo2,orthrus]
#
#   # Different k for LOF
#   python -m manylatents.main --config-name=config experiment=clinvar/deviation \
#     metrics.embedding.outlier_score.k=50

# Project settings
name: clinvar_deviation_analysis
project: merging-dogma

# Runtime
seed: 42
debug: false

# Data configuration - precomputed embeddings
data:
  _target_: manylatents.data.PrecomputedDataModule
  path: ${paths.output_dir}/embeddings/clinvar
  channels:
    - esm3       # Protein: 1536 dim
    - evo2       # DNA: 1920 dim
  labels_path: ${paths.output_dir}/embeddings/clinvar/labels.pt
  batch_size: 128
  num_workers: 0
  mode: full

# Algorithm configuration - MergingModule with PCA fusion
# PCA-based fusion before outlier detection
algorithms:
  latent:
    _target_: manylatents.algorithms.latent.MergingModule
    strategy: concat_pca
    channels: null
    weights: null
    normalize: true  # Important: normalize before LOF
    n_components: 50

# Metrics - Outlier scores with AUC against pathogenicity
metrics:
  embedding:
    outlier_score:
      _target_: manylatents.metrics.outlier_score.OutlierScore
      _partial_: true
      k: 20
      return_scores: false
    participation_ratio:
      _target_: manylatents.metrics.ParticipationRatio
      _partial_: true
    local_intrinsic_dim:
      _target_: manylatents.metrics.LocalIntrinsicDimensionality
      _partial_: true
