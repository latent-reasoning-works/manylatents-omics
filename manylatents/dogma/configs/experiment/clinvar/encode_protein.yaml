# @package _global_
#
# ClinVar Protein Encoding Experiment
#
# Encodes ClinVar variant protein sequences using ESM3 foundation model.
# Outputs embeddings to ${paths.output_dir}/embeddings/clinvar/esm3.pt
#
# Usage:
#   # Local (requires 16GB+ VRAM)
#   python -m manylatents.main --config-name=config experiment=clinvar/encode_protein
#
#   # Filter to specific genes
#   python -m manylatents.main --config-name=config experiment=clinvar/encode_protein data.genes=[BRCA1,BRCA2]
#
#   # Limit variants for testing
#   python -m manylatents.main --config-name=config experiment=clinvar/encode_protein data.max_variants=100
#
#   # Cluster submission
#   python -m manylatents.main --config-name=config experiment=clinvar/encode_protein cluster=mila_remote resources=gpu
#
#   # Config inspection (dry run)
#   python -m manylatents.main --config-name=config --cfg job experiment=clinvar/encode_protein

# Project settings
name: clinvar_encode_protein
project: merging-dogma

# Runtime
seed: 42
debug: false
eval_only: true

# Data configuration (inlined to avoid cross-provider defaults resolution)
data:
  _target_: manylatents.dogma.data.ClinVarDataModule
  data_dir: ${paths.data_dir}/clinvar
  genes: null
  pathogenicity: all
  max_variants: null
  batch_size: 32

# Algorithm configuration (inlined)
# _recursive_: false prevents Hydra from pre-instantiating encoder configs
algorithms:
  latent:
    _target_: manylatents.dogma.algorithms.BatchEncoder
    _recursive_: false
    modality: protein
    batch_size: 8
    normalize: false
    n_components: 1536
    save_path: ${paths.output_dir}/embeddings/clinvar/esm3.pt
    encoder_config:
      _target_: manylatents.dogma.encoders.ESM3Encoder
      weights_path: null
      device: cuda
