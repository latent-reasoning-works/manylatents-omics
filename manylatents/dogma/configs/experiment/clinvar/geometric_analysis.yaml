# @package _global_
#
# ClinVar Geometric Analysis Experiment
#
# Loads precomputed embeddings from encoding step, fuses them using MergingModule,
# and computes geometric metrics.
#
# Prerequisites:
#   Run encode_dna and encode_protein experiments first to generate embeddings.
#
# Usage:
#   # Basic run
#   python -m manylatents.main --config-name=config experiment=clinvar/geometric_analysis
#
#   # With different fusion strategy
#   python -m manylatents.main --config-name=config experiment=clinvar/geometric_analysis \
#     algorithms.latent.strategy=weighted_sum \
#     'algorithms.latent.weights={evo2: 0.5, esm3: 0.5}'
#
#   # Config inspection (dry run)
#   python -m manylatents.main --config-name=config --cfg job experiment=clinvar/geometric_analysis
#
#   # Cluster submission
#   python -m manylatents.main --config-name=config experiment=clinvar/geometric_analysis \
#     cluster=mila_remote resources=cpu

# Project settings
name: clinvar_geometric_analysis
project: merging-dogma

# Runtime
seed: 42
debug: false
eval_only: true

# Data configuration (inlined to avoid cross-provider defaults resolution)
# Loads precomputed embeddings from multiple channels
data:
  _target_: manylatents.data.PrecomputedDataModule
  path: ${paths.output_dir}/embeddings/clinvar
  channels:
    - evo2       # DNA embeddings from Evo2
    - esm3       # Protein embeddings from ESM3
  labels_path: ${paths.output_dir}/embeddings/clinvar/labels.pt
  batch_size: 128
  num_workers: 0
  mode: full

# Algorithm configuration (inlined)
# MergingModule fuses multi-channel embeddings
algorithms:
  latent:
    _target_: manylatents.algorithms.latent.MergingModule
    strategy: concat
    channels: null  # Use all available channels
    weights: null   # For weighted_sum: {evo2: 0.5, esm3: 0.5}
    normalize: false

# Metrics to compute on fused embeddings
# Uses manylatents metric registry
metrics:
  embedding:
    - _target_: manylatents.metrics.ParticipationRatio
    - _target_: manylatents.metrics.LocalIntrinsicDimensionality
    - _target_: manylatents.metrics.TangentSpace
