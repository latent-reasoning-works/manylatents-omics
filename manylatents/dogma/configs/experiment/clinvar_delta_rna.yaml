# @package _global_
#
# ClinVar Paired RNA Encoding Experiment
#
# Encodes WT or MUT RNA sequences using Orthrus for delta embedding computation.
# Run twice with channel=wt and channel=mut, then compute delta in analysis.
#
# Usage:
#   python -m manylatents.omics.main -m experiment=clinvar_delta_rna algorithms.latent.channel=wt,mut

# Project settings
name: clinvar_delta_rna

# Data configuration
data:
  _target_: manylatents.dogma.data.variant_datamodule.VariantDataModule
  variants_dir: ${data_dir}/clinvar/variants
  sequences_dir: ${data_dir}/clinvar/sequences
  variant_type: synonymous
  modality: rna
  batch_size: 32
  max_variants: null
  valid_variants_file: ${data_dir}/clinvar/variants/${data.variant_type}_valid_orthrus.txt

# Algorithm configuration
algorithms:
  latent:
    _target_: manylatents.dogma.algorithms.BatchEncoder
    _recursive_: false
    modality: rna
    channel: wt
    batch_size: 8
    normalize: false
    n_components: 256
    save_path: ${output_dir}/embeddings/${data.variant_type}/${algorithms.latent.channel}_rna.pt
    encoder_config:
      _target_: manylatents.dogma.encoders.OrthrusEncoder
      model_name: quietflamingo/orthrus-base-4-track
      device: cuda
