# @package _global_
#
# Fusion: Autoencoder (Learned)
#
# Learn a compressed representation via bottleneck autoencoder.
# Captures non-linear relationships between modalities.
#
# Usage:
#   python -m manylatents.omics.main --config-name=config experiment=fusion/autoencoder
#
#   # Custom architecture
#   python -m manylatents.omics.main --config-name=config experiment=fusion/autoencoder \
#     algorithms.latent.hidden_dims=[512,256] \
#     algorithms.latent.epochs=100

defaults:
  - base

name: fusion_autoencoder

algorithms:
  latent:
    _target_: manylatents.dogma.algorithms.AutoencoderFusion
    target_dim: 256
    hidden_dims: [512, 256]
    dropout: 0.1
    activation: gelu
    epochs: 50
    batch_size: 128
    learning_rate: 0.001
    weight_decay: 0.0001
    early_stopping_patience: 10
    channels: null
    normalize: false
