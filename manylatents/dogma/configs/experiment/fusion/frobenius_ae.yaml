# @package _global_
#
# Fusion: Frobenius-Regularized Autoencoder (MBYL-style)
#
# Autoencoder with Jacobian penalty to encourage smooth mappings.
# Based on MBYL (Manifold-Based Yoking Learning) principles.
#
# The Frobenius penalty regularizes the encoder Jacobian, encouraging
# the learned representation to preserve local geometry.
#
# Usage:
#   python -m manylatents.omics.main --config-name=config experiment=fusion/frobenius_ae
#
#   # Adjust regularization strength
#   python -m manylatents.omics.main --config-name=config experiment=fusion/frobenius_ae \
#     algorithms.latent.frobenius_weight=0.1

defaults:
  - base

name: fusion_frobenius_ae

algorithms:
  latent:
    _target_: manylatents.dogma.algorithms.FrobeniusAEFusion
    target_dim: 256
    hidden_dims: [512, 256]
    dropout: 0.1
    activation: gelu
    epochs: 50
    batch_size: 128
    learning_rate: 0.001
    weight_decay: 0.0001
    early_stopping_patience: 10
    frobenius_weight: 0.01
    n_jacobian_samples: 10
    channels: null
    normalize: false
