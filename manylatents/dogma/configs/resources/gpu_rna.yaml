# @package _global_

# GPU resources for RNA encoders (Orthrus + ESM3)
# Uses .venv with torch 2.5.1+cu121 + mamba-ssm (locked)

hydra:
  launcher:
    cpus_per_task: 4
    gpus_per_task: 1
    mem_gb: 32
    timeout_min: 120

    setup:
      - "module load cuda/12.1.1"
      - "uv sync --extra dogma --index-strategy unsafe-best-match"
