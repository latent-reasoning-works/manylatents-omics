# @package _global_
# HGDP+1KGP experiment using ManifoldGeneticsDataModule
#
# Uses only projection (test) data with project labels.
#
# Usage:
#   uv run python -m manylatents.omics.main experiment=hgdp_exp
#   uv run python -m manylatents.omics.main experiment=hgdp_exp algorithms/latent=umap

name: hgdp_1kgp_exp
project: manylatents-omics

defaults:
  - override /algorithms/latent: phate
  - override /callbacks/embedding: default
  - override /metrics: admixture_preservation_ratio

seed: 42

data:
  _target_: manylatents.popgen.data.ManifoldGeneticsDataModule

  batch_size: 128
  num_workers: 4
  mode: full  # Use same data for train and test (projection only)
  shuffle_traindata: false

  # PCA path (in full mode, train_* is used for both train and test)
  train_pca_path: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/pca/transform_pca_50.csv

  # Admixture paths (K=2-10)
  train_admixture_paths:
    2: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.2.csv
    3: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.3.csv
    4: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.4.csv
    5: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.5.csv
    6: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.6.csv
    7: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.7.csv
    8: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.8.csv
    9: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.9.csv
    10: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/outputs/admixture/transform.10.csv

  # Labels (project labels only) and colormap
  labels_path: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/data/hgdp_project_labels.csv
  colormap_path: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/colormaps/hgdp_1kgp.json
  label_column: Population

  # Geographic labels (samples with meaningful geography, excludes AMR/CEU/ASW/ACB)
  geographic_labels_path: /home/mila/m/matthew.scicluna/ActiveProjects/manifold_genetics/examples/hgdp_1kgp/data/hgdp_project_geographic.csv

algorithms:
  latent:
    n_components: 2
    knn: 100
    t: 3

# Enable metric CSV export
callbacks:
  embedding:
    save_embeddings:
      save_metric_tables: true
