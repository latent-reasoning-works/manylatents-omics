defaults:
  - default

_target_: manylatents.singlecell.data.cellxgene_census.CellxGeneCensusDataModule
organism: "Homo sapiens"
obs_value_filter: "tissue_general == 'blood' and disease == 'normal'"
obs_column_names: ["cell_type", "tissue", "donor_id"]
label_key: cell_type
n_cells_max: 5000
batch_size: 128
test_split: 0.2
shuffle_traindata: false
mode: full
