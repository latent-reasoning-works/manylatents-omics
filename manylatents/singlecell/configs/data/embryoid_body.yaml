defaults:
  - default

# Embryoid Body (Moon et al. 2019): 16,825 cells, 17,580 genes, true raw counts.
# Downloaded from EBdata.mat in the PHATE GitHub repo.
# Gene names are HGNC symbols, compatible with scGPT vocabulary.
_target_: manylatents.singlecell.data.anndata.AnnDataModule
adata_path: ${omics_data:}/single_cell/embryoid_body_raw_counts.h5ad
label_key: sample_labels
layer: counts
use_raw: false
mode: full
batch_size: 128
test_split: 0.2
shuffle_traindata: false
