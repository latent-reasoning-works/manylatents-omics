defaults:
  - default

# PBMC 68k: full 68,579-cell dataset from 10X Genomics with raw integer counts.
# Gene names are HGNC symbols, compatible with scGPT vocabulary.
_target_: manylatents.singlecell.data.anndata.AnnDataModule
adata_path: ${omics_data:}/single_cell/pbmc_68k_raw_counts.h5ad
label_key: null
layer: counts
use_raw: false
mode: full
batch_size: 64
test_split: 0.2
shuffle_traindata: false
