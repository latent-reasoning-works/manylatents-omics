# DNA encoder venv config (Evo2 + ESM3)
# torch 2.8+ required for transformer-engine prebuilt wheels
#
# Usage:
#   uv sync --config pyproject-dna.toml --extra dogma-dna
#   uv run --config pyproject-dna.toml python -c "import evo2"

[project]
name = "manylatents-omics-dna"
version = "0.2.0"
description = "DNA encoder venv for manylatents-omics"
requires-python = ">=3.11, <3.13"

dependencies = [
    "httpx>=0.28.1",
    "manylatents",
    "ninja>=1.13.0",
    "pandas-plink>=2.2.9",
    "torch>=2.8",  # Required for transformer-engine prebuilt wheels
]

[project.optional-dependencies]
esm = ["esm>=3.0"]
evo2 = ["evo2"]
dogma-dna = ["esm>=3.0", "evo2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["manylatents"]

[tool.uv]
managed = true

[[tool.uv.index]]
name = "pytorch-cu126"
url = "https://download.pytorch.org/whl/cu126"

[tool.uv.sources]
manylatents = { git = "https://github.com/latent-reasoning-works/manylatents.git", branch = "main" }
torch = { index = "pytorch-cu126" }
torchvision = { index = "pytorch-cu126" }

# Dependency metadata overrides (same as main pyproject.toml)
[[tool.uv.dependency-metadata]]
name = "heatgeo"
version = "0.0.1"
requires-dist = ["numpy>=1.23"]

[[tool.uv.dependency-metadata]]
name = "archetypes"
version = "0.11.1"
requires-dist = ["scipy>=1.8,<1.15"]

[[tool.uv.dependency-metadata]]
name = "magnipy"
version = "0.1.0"
requires-dist = ["torch>=2.4.1,<3.0.0", "scipy>=1.13.0,<1.15"]
