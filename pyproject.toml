[project]
name = "manylatents-omics"
version = "0.2.0"
description = "Biological extensions for manylatents: popgen and central dogma encoders"
authors = [
    { name = "César Miguel Valdez Córdova", email = "cesar.valdez@mila.quebec" },
    { name = "Matthew Scicluna", email = "matthew.scicluna@mila.quebec"}
]
readme = "README.md"
requires-python = ">=3.10, <3.13"
keywords = [
    "machine-learning",
    "dimensionality-reduction",
    "population-genetics",
    "foundation-models",
    "central-dogma",
]

dependencies = [
    "httpx>=0.28.1",
    "manylatents",
    "ninja>=1.13.0",
    "pandas-plink>=2.2.9",
]

[project.optional-dependencies]
singlecell = [
    "anndata>=0.11.3",
    "python-igraph>=1.0.0",
    "scanpy>=1.11.5",
]
# Foundation model encoders
# ⚠️  WARNING: orthrus/evo2 require Ampere+ GPU (A100, L40S, H100) to build!
#     RTX 8000/3090 (Turing, sm_75) will FAIL with nvcc errors.
#     See README.md for installation instructions.
#     Quick: salloc --gpus=l40s:1 && module load cuda/12.6.0 && uv sync --extra orthrus
esm = ["esm>=3.0"]
evo2 = ["evo2", "transformer-engine[pytorch]>=2.0"]
orthrus = [
    "orthrus",
    "mamba-ssm>=2.0",
]
dogma = ["esm>=3.0", "evo2", "orthrus", "mamba-ssm>=2.0", "transformer-engine[pytorch]>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["manylatents"]

[tool.uv]
managed = true
# CUDA packages need torch available at build time
no-build-isolation-package = ["mamba_ssm", "transformer_engine", "flash_attn"]

[tool.uv.extra-build-dependencies]
mamba_ssm = [{ requirement = "torch", match-runtime = true }]
transformer_engine = [{ requirement = "torch", match-runtime = true }]
flash_attn = [{ requirement = "torch", match-runtime = true }]

[tool.uv.sources]
manylatents = { git = "ssh://git@github.com/latent-reasoning-works/manylatents.git" }
archetypes = { git = "https://github.com/aleixalcacer/archetypes.git" }

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
markers = [
    "gpu: tests requiring GPU and model weights",
    "slow: tests that take significant time to run",
]

# Inherit dependency metadata overrides from manylatents
[[tool.uv.dependency-metadata]]
name = "heatgeo"
version = "0.0.1"
requires-dist = ["numpy>=1.25"]

[[tool.uv.dependency-metadata]]
name = "archetypes"
version = "0.11.1"
requires-dist = ["scipy>=1.8,<1.15"]

[[tool.uv.dependency-metadata]]
name = "magnipy"
version = "0.1.0"
requires-dist = ["torch>=2.4.1,<3.0.0", "scipy>=1.13.0,<1.15"]

# CUDA packages that need torch at build time
# Note: Build dependencies are now specified in [tool.uv.extra-build-dependencies]
