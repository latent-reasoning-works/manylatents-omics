[project]
name = "manylatents-omics"
version = "0.2.0"
description = "Biological extensions for manylatents: popgen and central dogma encoders"
authors = [
    { name = "César Miguel Valdez Córdova", email = "cesar.valdez@mila.quebec" },
    { name = "Matthew Scicluna", email = "matthew.scicluna@mila.quebec" },
]
readme = "README.md"
requires-python = ">=3.10, <3.13"
keywords = [
    "machine-learning",
    "dimensionality-reduction",
    "population-genetics",
    "foundation-models",
    "central-dogma",
]

dependencies = [
    "httpx>=0.28.1",
    "manylatents",
    "ninja>=1.13.0",
    "pandas-plink>=2.2.9",
]

[project.optional-dependencies]
singlecell = ["anndata>=0.11.3", "python-igraph>=1.0.0", "scanpy>=1.11.5"]
# Foundation model encoders (ESM3, Evo2)
# Installation requires:
#   1. Wheelnext uv for prebuilt CUDA wheels (mamba-ssm, transformer-engine-torch):
#      curl -LsSf https://astral.sh/uv/install.sh | INSTALLER_DOWNLOAD_URL=https://wheelnext.astral.sh sh
#   2. Lock with: uv lock --index-strategy unsafe-best-match
#   3. Sync with: uv sync --extra dogma --index-strategy unsafe-best-match
#   4. For imports on login nodes: module load cuda/12.4.1 (SLURM GPU nodes have CUDA automatically)
#
# Note: Orthrus (RNA encoder) requires mamba-ssm 1.x which conflicts with Evo2's mamba-ssm 2.x.
# Orthrus embeddings are precomputed using tools/orthrus-embed/ and loaded from cache.
# See CLAUDE.md "Central Dogma Fusion" section for workflow.
esm = ["esm>=3.0"]
evo2 = ["evo2"]
dogma = [
    "torch>=2.7,<2.8",  # Pin for transformer-engine-torch ABI compatibility
    "torchvision>=0.22,<0.23",  # Must match torch version
    "nvidia-cudnn-cu12>=9.5",  # Needs actual runtime libs
    "esm>=3.0",
    "evo2",
    "mamba-ssm>=2.0",  # Required by Evo2
    "transformer-engine-torch>=2.0",  # Required by vortex (evo2's backend)
    "flash-attn>=2.0",  # Needs CUDA_HOME at build time
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["manylatents", "hydra_plugins"]

[tool.uv]
managed = true

[tool.uv.sources]
manylatents = { git = "https://github.com/latent-reasoning-works/manylatents.git" }
# Archetypes already has a prebuilt wheel on PyPI, at exactly the version we want (0.11.1).
# archetypes = { git = "https://github.com/aleixalcacer/archetypes.git" }

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
markers = [
    "gpu: tests requiring GPU and model weights",
    "slow: tests that take significant time to run",
]

# Wheel variants (wheelnext uv) handles CUDA package selection automatically
# See: https://astral.sh/blog/wheel-variants

# Inherit dependency metadata overrides from manylatents
[[tool.uv.dependency-metadata]]
name = "heatgeo"
version = "0.0.1"
requires-dist = ["numpy>=1.25"]

[[tool.uv.dependency-metadata]]
name = "archetypes"
version = "0.11.1"
requires-dist = ["scipy>=1.8,<1.15"]

[[tool.uv.dependency-metadata]]
name = "magnipy"
version = "0.1.0"
requires-dist = ["torch>=2.4.1,<3.0.0", "scipy>=1.13.0,<1.15"]

# CUDA packages that need torch at build time
# Note: Build dependencies are now specified in [tool.uv.extra-build-dependencies]
